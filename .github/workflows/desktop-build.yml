name: Desktop packages

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  package:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot
      - run: npm ci
      - run: npm run check
      - run: npm run desktop:make
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-editor-${{ runner.os }}-${{ runner.arch }}-unsigned
          path: desktop-dist/make/**
          if-no-files-found: error

# Gli artefatti CI sono deliberatamente marcati unsigned. La promozione a
# release richiede firma Authenticode/Developer ID o repository Linux firmato.
